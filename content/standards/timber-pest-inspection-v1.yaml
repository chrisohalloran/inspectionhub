matrix_id: timber-pest-inspection-v1
module: timber_pest
status: draft_unverified
effective_for_product: false
review:
  required_role: suitably licensed timber pest inspector
  reviewed_by: null
  reviewed_at: null
source_status:
  standard: AS 4349.3-2010 candidate baseline; Standards Australia listed Pending Revision on 2026-07-14
  authorised_copy_reviewed: false
  launch_check: Obtain and review an authorised current copy, amendments or replacement before professional sign-off or launch
copyright_boundary: Candidate independently worded product controls only; no claim of standard completeness and no standard text reproduced
requirements:
  - id: TPE-AGR-001
    phase: pre_inspection
    product_rule: Keep the Timber Pest commission, agreement, inspector credential and report approval distinct from the Building module.
    evidence: immutable module identity and agreement record
  - id: TPE-INSP-001
    phase: inspection
    product_rule: Record area-by-area access and distinguish visible evidence, apparent timber damage and conducive conditions.
    evidence: coverage ledger and inspector-authored observations
  - id: TPE-INSP-002
    phase: inspection
    product_rule: Preserve limits arising from inaccessible, obstructed or concealed areas and do not infer absence from photographs.
    evidence: active limitation and frozen packet
  - id: TPE-REP-001
    phase: reporting
    product_rule: Keep Timber Pest findings, conclusion, evidence selection and approval in their own immutable module snapshot.
    evidence: Timber Pest snapshot and package manifest
  - id: TPE-REP-002
    phase: reporting
    product_rule: Any no-visible-evidence statement is bounded to accessible inspected areas and the inspection time and cites exact coverage evidence.
    evidence: coverage-linked clause provenance
  - id: TPE-REP-003
    phase: reporting
    product_rule: Preserve inspector-directed technical further investigation without transaction advice or an absolute absence guarantee.
    evidence: confirmed recommendation and deterministic guard
  - id: TPE-BND-001
    phase: all
    product_rule: Never claim termite-free, no timber pests, passed, safe or guaranteed condition.
    evidence: deterministic guard and inspector approval
