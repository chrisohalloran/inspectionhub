appId: co.inspectionhub.field
name: Persisted exact review, independent approval and synthetic delivery state
---
- launchApp:
    clearState: true
- tapOn:
    text: "InspectionHub Field, http://.*"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- scrollUntilVisible:
    element:
      text: "Review & complete"
    direction: UP
    centerElement: false
- scrollUntilVisible:
    element:
      text: "Test: complete coverage"
    direction: DOWN
    visibilityPercentage: 50
    centerElement: false
- tapOn: "Test: complete coverage"
- assertVisible: ".*Synthetic test coverage completed.*"
- scrollUntilVisible:
    element:
      text: "Review & complete"
    direction: UP
    centerElement: true
- tapOn: "Review & complete"
- scrollUntilVisible:
    element:
      text: ".*Completion checklist.*"
    direction: DOWN
    visibilityPercentage: 50
    centerElement: true
- assertVisible: ".*Completion checklist.*"
- scrollUntilVisible:
    element:
      text: "AI suggestion — review required.*"
    direction: DOWN
    centerElement: true
- assertVisible: "AI suggestion — review required.*"
- scrollUntilVisible:
    element:
      text: "Accept finding"
    direction: DOWN
    centerElement: true
- tapOn:
    text: "Accept finding"
    index: 0
- assertVisible: "Finding accepted"
- scrollUntilVisible:
    element:
      text: "Accept finding"
    direction: DOWN
    centerElement: true
- tapOn:
    text: "Accept finding"
    index: 0
- assertVisible: "Finding accepted"
- scrollUntilVisible:
    element:
      text: "Approve Building"
    direction: DOWN
- tapOn: "Approve Building"
- assertVisible: "Building approved"
- tapOn: "Approve Timber Pest"
- assertVisible: "Timber Pest approved"
- tapOn: "Confirm delivery package"
- scrollUntilVisible:
    element:
      text: "Delivery queued.*"
    direction: DOWN
    centerElement: true
- assertVisible: "Delivery queued.*"
- stopApp
- launchApp
- assertVisible: ".*Storage ready.*"
- scrollUntilVisible:
    element:
      text: "Review & complete"
    direction: UP
    centerElement: true
- tapOn: "Review & complete"
- scrollUntilVisible:
    element:
      text: ".*Completion checklist.*"
    direction: DOWN
    visibilityPercentage: 50
    centerElement: true
- assertVisible: ".*Completion checklist.*"
- scrollUntilVisible:
    element:
      text: "Building approved"
    direction: DOWN
- assertVisible: "Timber Pest approved"
- scrollUntilVisible:
    element:
      text: "Delivery queued.*"
    direction: DOWN
- assertVisible: "Delivery queued"
- scrollUntilVisible:
    element:
      text: "Test: provider confirms sent"
    direction: DOWN
    centerElement: true
- tapOn: "Test: provider confirms sent"
- scrollUntilVisible:
    element:
      text: "Sent"
    direction: UP
    centerElement: true
- assertVisible: "Sent"
