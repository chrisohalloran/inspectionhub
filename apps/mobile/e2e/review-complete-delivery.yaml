appId: co.inspectionhub.field
name: Persisted exact review, independent approval and synthetic delivery state
---
- launchApp:
    clearState: true
- openLink: "exp+inspectionhub-field://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081"
- tapOn:
    text: "InspectionHub Field, http://.*"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- scrollUntilVisible:
    element:
      text: "Show test tools"
    direction: UP
    centerElement: false
- tapOn: "Show test tools"
- scrollUntilVisible:
    element:
      text: "Test: complete coverage"
    direction: DOWN
    visibilityPercentage: 50
    centerElement: false
- tapOn: "Test: complete coverage"
- scrollUntilVisible:
    element:
      text: "Hide test tools"
    direction: UP
    centerElement: true
- tapOn: "Hide test tools"
- assertVisible: ".*Synthetic test coverage completed.*"
- scrollUntilVisible:
    element:
      text: "Review & issue"
    direction: UP
    centerElement: true
- tapOn: "Review & issue"
- scrollUntilVisible:
    element:
      text: ".*Completion checklist.*"
    direction: DOWN
    visibilityPercentage: 50
    centerElement: true
- assertVisible: ".*Completion checklist.*"
- scrollUntilVisible:
    element:
      text: "AI suggestion — review required.*"
    direction: DOWN
    centerElement: true
- assertVisible: "AI suggestion — review required.*"
- scrollUntilVisible:
    element:
      text: "Accept finding"
    direction: DOWN
    visibilityPercentage: 50
    centerElement: false
- tapOn:
    text: "Accept finding"
    index: 0
- scrollUntilVisible:
    element:
      text: "Finding accepted"
    direction: UP
    visibilityPercentage: 50
    centerElement: false
- assertVisible: "Finding accepted"
- scrollUntilVisible:
    element:
      text: "Accept finding"
    direction: DOWN
    visibilityPercentage: 50
    centerElement: false
- tapOn:
    text: "Accept finding"
    index: 0
- scrollUntilVisible:
    element:
      text: "Finding accepted"
    direction: UP
    visibilityPercentage: 50
    centerElement: false
- assertVisible: "Finding accepted"
- scrollUntilVisible:
    element:
      text: "Approve Building"
    direction: DOWN
- tapOn: "Approve Building"
- assertVisible: "Building approved"
- scrollUntilVisible:
    element:
      text: "Approve Timber Pest"
    direction: DOWN
    visibilityPercentage: 50
    centerElement: false
- tapOn: "Approve Timber Pest"
- assertVisible: "Both commissioned modules are independently approved"
- scrollUntilVisible:
    element:
      text: "Confirm delivery package"
    direction: DOWN
    visibilityPercentage: 50
    centerElement: false
- tapOn: "Confirm delivery package"
- scrollUntilVisible:
    element:
      text: "Delivery queued.*"
    direction: DOWN
    centerElement: true
- assertVisible: "Delivery queued.*"
- stopApp
- launchApp
- tapOn:
    text: "Close"
    optional: true
- assertVisible: ".*Storage ready.*"
- scrollUntilVisible:
    element:
      text: "Review & issue"
    direction: UP
    centerElement: true
- tapOn: "Review & issue"
- scrollUntilVisible:
    element:
      text: ".*Completion checklist.*"
    direction: DOWN
    visibilityPercentage: 50
    centerElement: true
- assertVisible: ".*Completion checklist.*"
- scrollUntilVisible:
    element:
      text: "Both commissioned modules are independently approved"
    direction: DOWN
    speed: 90
    timeout: 60000
    visibilityPercentage: 25
    centerElement: false
- assertVisible: "Both commissioned modules are independently approved"
- scrollUntilVisible:
    element:
      text: "Delivery queued.*"
    direction: DOWN
- assertVisible: "Delivery queued"
- scrollUntilVisible:
    element:
      text: "Test: provider confirms sent"
    direction: DOWN
    centerElement: true
- tapOn: "Test: provider confirms sent"
- scrollUntilVisible:
    element:
      text: "Sent"
    direction: UP
    centerElement: true
- assertVisible: "Sent"
