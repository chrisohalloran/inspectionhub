appId: co.inspectionhub.field
name: Investigation evidence, measurement, coverage and shared completion
---
- launchApp:
    clearState: true
- tapOn:
    text: "InspectionHub Field, http://.*"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- assertVisible: ".*Storage ready.*"
- tapOn: "Take photo"
- assertVisible: ".*Photo saved locally as private coverage evidence — queued for sync.*"
- tapOn: "Take photo"
- assertVisible: ".*Photo saved locally as private coverage evidence — queued for sync.*"
- tapOn: "Take photo"
- assertVisible: ".*Photo saved locally as private coverage evidence — queued for sync.*"
- tapOn: "Start investigation"
- assertVisible: ".*Investigation started — capture remains private until inspector review.*"
- tapOn: "Record voice note"
- assertVisible: ".*Voice note recording — photo capture remains available.*"
- tapOn: "Stop voice note"
- assertVisible: ".*Voice note saved locally and linked to the active investigation — queued for sync.*"
- scrollUntilVisible:
    element:
      text: "Attach recent (3)"
    direction: DOWN
    centerElement: true
- tapOn: "Attach recent (3)"
- assertVisible: ".*3 recent captures attached in original capture order.*"
- scrollUntilVisible:
    element:
      text: "Add manual note"
    direction: DOWN
    centerElement: true
- tapOn: "Add manual note"
- swipe:
    start: 2%, 55%
    end: 2%, 25%
    duration: 500
- tapOn:
    id: "manual-observation-input"
- inputText: "Cracking was observed through several tiles in the shower base and main bathroom floor area."
- assertVisible: ".*Cracking was observed through several tiles.*"
- swipe:
    start: 2%, 55%
    end: 2%, 25%
    duration: 500
- scrollUntilVisible:
    element:
      text: "Save manual observation"
    direction: UP
    centerElement: true
- tapOn: "Save manual observation"
- assertVisible: ".*Manual observation saved and linked to the active investigation.*"
- assertVisible: ".*1 manual notes.*"
- scrollUntilVisible:
    element:
      text: "Change area"
    direction: UP
    visibilityPercentage: 50
- tapOn: "Change area"
- assertVisible: "Select area"
- scrollUntilVisible:
    element:
      text: "Roof void"
    direction: DOWN
    centerElement: true
- tapOn: "Roof void"
- assertVisible: ".*Roof void selected — active investigation retained.*"
- scrollUntilVisible:
    element:
      text: "Add measurement"
    direction: UP
    centerElement: true
- tapOn: "Add measurement"
- scrollUntilVisible:
    element:
      text: "Measurement numeric input"
    direction: DOWN
    centerElement: true
- tapOn: "Measurement numeric input"
- inputText: "1.5"
- scrollUntilVisible:
    element:
      text: "Save measurement"
    direction: DOWN
    centerElement: true
- tapOn: "Save measurement"
- assertVisible: ".*Measurement saved locally in Roof void.*"
- scrollUntilVisible:
    element:
      text: "Review evidence areas"
    direction: UP
    centerElement: true
- tapOn: "Review evidence areas"
- scrollUntilVisible:
    element:
      text: "Correct assigned area"
    direction: DOWN
    centerElement: true
- tapOn: "Correct assigned area"
- scrollUntilVisible:
    element:
      text: "Assign to Roof void"
    direction: DOWN
    centerElement: true
- tapOn: "Assign to Roof void"
- assertVisible: ".*original capture area retained.*"
- scrollUntilVisible:
    element:
      text: "Close evidence areas"
    direction: DOWN
    centerElement: true
- tapOn: "Close evidence areas"
- scrollUntilVisible:
    element:
      text: "Close out area"
    direction: UP
    visibilityPercentage: 50
- tapOn: "Close out area"
- assertVisible: "Close out Roof void"
- scrollUntilVisible:
    element:
      text: "Inaccessible"
    direction: DOWN
    centerElement: true
- tapOn:
    text: "Inaccessible"
    retryTapIfNoChange: true
- assertVisible: "Inaccessible — selected"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: ".*Coverage detail input.*"
    direction: DOWN
    centerElement: true
- tapOn: ".*Coverage detail input.*"
- inputText: "Access hatch obstructed at the time of inspection."
- scrollUntilVisible:
    element:
      text: "Save coverage"
    direction: DOWN
    centerElement: true
- swipe:
    start: 2%, 55%
    end: 2%, 25%
    duration: 500
- scrollUntilVisible:
    element:
      text: "Save coverage"
    direction: UP
    speed: 20
    visibilityPercentage: 50
    centerElement: false
- tapOn: "Save coverage"
- assertVisible: ".*Building coverage recorded as inaccessible.*"
- scrollUntilVisible:
    element:
      text: "Finish investigation"
    direction: UP
    visibilityPercentage: 50
- tapOn: "Finish investigation"
- assertVisible: "Finding candidate modules"
- scrollUntilVisible:
    element:
      text: "Building candidate — not selected"
    direction: DOWN
    centerElement: true
- tapOn: "Building candidate — not selected"
- scrollUntilVisible:
    element:
      id: "candidate-building-evidence-0"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "candidate-building-evidence-0"
- assertVisible: ".*Evidence 1: voice note.*selected.*"
- scrollUntilVisible:
    element:
      id: "candidate-building-evidence-4"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "candidate-building-evidence-4"
- assertVisible: ".*Evidence 5: manual note.*selected.*"
- scrollUntilVisible:
    element:
      id: "candidate-building-observation-0"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "candidate-building-observation-0"
- assertVisible: ".*Observation 1: Cracking was observed through several tiles.*selected.*"
- scrollUntilVisible:
    element:
      text: "Confirm Building candidate sources"
    direction: DOWN
    centerElement: true
- tapOn: "Confirm Building candidate sources"
- assertVisible: ".*Building candidate sources confirmed: 2 evidence items and 1 inspector observation.*"
- assertVisible: "Building sources confirmed — 2 evidence items, 1 observation"
- scrollUntilVisible:
    element:
      text: "Save finding candidate"
    direction: DOWN
    centerElement: true
- tapOn: "Save finding candidate"
- assertVisible: ".*deterministic synthetic draft ready from the exact source packet.*"
