appId: co.inspectionhub.field
name: Investigation evidence, measurement, coverage and shared completion
---
- launchApp:
    clearState: true
- openLink: "exp+inspectionhub-field://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081"
- tapOn:
    text: "InspectionHub Field, http://.*"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- assertVisible: ".*Storage ready.*"
- tapOn: "Take photo"
- assertVisible: ".*Photo saved locally as private coverage evidence — queued for sync.*"
- tapOn: "Take photo"
- assertVisible: ".*Photo saved locally as private coverage evidence — queued for sync.*"
- tapOn: "Take photo"
- assertVisible: ".*Photo saved locally as private coverage evidence — queued for sync.*"
- tapOn: "Start investigation"
- assertVisible: ".*Investigation started — capture remains private until inspector review.*"
- tapOn: "Record voice note"
- assertVisible: ".*Voice note recording — photo capture remains available.*"
- tapOn: "Stop voice note"
- assertVisible: ".*Voice note saved locally and linked to the active investigation — queued for sync.*"
- scrollUntilVisible:
    element:
      text: "Attach recent (3)"
    direction: DOWN
    centerElement: true
- tapOn: "Attach recent (3)"
- assertVisible: ".*3 recent captures attached in original capture order.*"
- scrollUntilVisible:
    element:
      text: "Add manual note"
    direction: DOWN
    centerElement: true
- tapOn: "Add manual note"
- swipe:
    start: 2%, 55%
    end: 2%, 25%
    duration: 500
- tapOn:
    id: "manual-observation-input"
- inputText: "Cracking was observed through several tiles in the shower base and main bathroom floor area."
- assertVisible: ".*Cracking was observed through several tiles.*"
- swipe:
    start: 2%, 55%
    end: 2%, 25%
    duration: 500
- scrollUntilVisible:
    element:
      text: "Save manual observation"
    direction: UP
    centerElement: true
- tapOn: "Save manual observation"
- assertVisible: ".*Manual observation saved and linked to the active investigation.*"
- scrollUntilVisible:
    element:
      id: "change-area-control"
    direction: UP
    visibilityPercentage: 50
    centerElement: true
- tapOn:
    id: "change-area-control"
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: "Select area"
    direction: DOWN
    visibilityPercentage: 50
    centerElement: false
- assertVisible: "Select area"
- scrollUntilVisible:
    element:
      text: "Roof void"
    direction: DOWN
    centerElement: true
- tapOn: "Roof void"
- assertVisible: ".*Roof void selected — active investigation retained.*"
- scrollUntilVisible:
    element:
      text: "More investigation tools"
    direction: UP
    centerElement: true
- tapOn:
    id: "investigation-tools-toggle"
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      id: "add-measurement-control"
    direction: DOWN
    visibilityPercentage: 75
    centerElement: true
- tapOn:
    text: "Add measurement"
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: "Measurement numeric input"
    direction: DOWN
    centerElement: true
- tapOn: "Measurement numeric input"
- inputText: "1.5"
- scrollUntilVisible:
    element:
      text: "Save measurement"
    direction: DOWN
    centerElement: true
- tapOn: "Save measurement"
- assertVisible: ".*Measurement saved locally in Roof void.*"
- scrollUntilVisible:
    element:
      text: "More investigation tools"
    direction: UP
    centerElement: true
- tapOn:
    id: "investigation-tools-toggle"
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      id: "review-evidence-areas-control"
    direction: DOWN
    visibilityPercentage: 75
    centerElement: true
- tapOn:
    text: "Review evidence areas"
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: "Correct assigned area"
    direction: DOWN
    centerElement: true
- tapOn: "Correct assigned area"
- scrollUntilVisible:
    element:
      text: "Assign to Roof void"
    direction: DOWN
    centerElement: true
- tapOn: "Assign to Roof void"
- scrollUntilVisible:
    element:
      text: "Assigned to Roof void"
    direction: UP
    visibilityPercentage: 50
    centerElement: false
- assertVisible: "Assigned to Roof void"
- scrollUntilVisible:
    element:
      text: "Captured in Second floor / Main bathroom"
    direction: UP
    visibilityPercentage: 50
    centerElement: false
- assertVisible: "Captured in Second floor / Main bathroom"
- scrollUntilVisible:
    element:
      text: "Done"
    direction: DOWN
    centerElement: true
- tapOn: "Done"
- scrollUntilVisible:
    element:
      id: "close-out-area-control"
    direction: UP
    visibilityPercentage: 50
    centerElement: true
- tapOn:
    id: "close-out-area-control"
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: "Close out Roof void"
    direction: DOWN
    visibilityPercentage: 50
    centerElement: false
- assertVisible: "Close out Roof void"
- scrollUntilVisible:
    element:
      text: "Inaccessible"
    direction: DOWN
    centerElement: true
- tapOn:
    text: "Inaccessible"
    retryTapIfNoChange: true
- assertVisible: "Selected: Inaccessible"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: ".*Coverage detail input.*"
    direction: DOWN
    centerElement: true
- tapOn: ".*Coverage detail input.*"
- inputText: "Access hatch obstructed at the time of inspection."
- scrollUntilVisible:
    element:
      text: "Save coverage"
    direction: DOWN
    centerElement: true
- swipe:
    start: 2%, 55%
    end: 2%, 25%
    duration: 500
- scrollUntilVisible:
    element:
      text: "Save coverage"
    direction: UP
    speed: 20
    visibilityPercentage: 50
    centerElement: false
- tapOn: "Save coverage"
- assertVisible: ".*Building coverage recorded as inaccessible.*"
- scrollUntilVisible:
    element:
      text: "Finish investigation"
    direction: UP
    visibilityPercentage: 50
- swipe:
    start: 50%, 55%
    end: 50%, 25%
    duration: 500
- tapOn:
    id: "finish-investigation-control"
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: "Finding candidate modules"
    direction: DOWN
    visibilityPercentage: 50
    centerElement: false
- assertVisible: "Finding candidate modules"
- scrollUntilVisible:
    element:
      text: "Building candidate — not selected"
    direction: DOWN
    centerElement: true
- tapOn: "Building candidate — not selected"
- scrollUntilVisible:
    element:
      text: "Change sources"
    direction: DOWN
    centerElement: true
- tapOn: "Change sources"
- scrollUntilVisible:
    element:
      id: "candidate-building-evidence-0"
    direction: DOWN
    centerElement: true
- assertVisible:
    id: "candidate-building-evidence-0"
- scrollUntilVisible:
    element:
      text: "Done changing sources"
    direction: DOWN
    centerElement: true
- tapOn: "Done changing sources"
- scrollUntilVisible:
    element:
      text: "Confirm Building linked sources"
    direction: UP
    centerElement: true
- tapOn:
    id: "confirm-building-linked-sources"
- scrollUntilVisible:
    element:
      text: "Building sources confirmed — 5 evidence items, 1 observation"
    direction: UP
    centerElement: true
- assertVisible: "Building sources confirmed — 5 evidence items, 1 observation"
- scrollUntilVisible:
    element:
      text: "Save finding candidate"
    direction: DOWN
    centerElement: true
- tapOn: "Save finding candidate"
- assertVisible: ".*deterministic synthetic draft ready from the exact source packet.*"
