appId: co.inspectionhub.field
name: Atomic-rename termination and startup recovery
---
- launchApp:
    clearState: true
- tapOn:
    text: "InspectionHub Field, http://.*"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- assertVisible: "Take photo"
- scrollUntilVisible:
    element:
      text: "Review & complete"
    direction: UP
    centerElement: false
- scrollUntilVisible:
    element:
      text: "Test: terminate after rename"
    direction: DOWN
    centerElement: true
- tapOn: "Test: terminate after rename"
- assertVisible: ".*Next synthetic capture will terminate after atomic rename.*"
- tapOn: "Take photo"
- launchApp
- assertVisible: ".*Recovery checked 1 interrupted capture boundary.*"
- scrollUntilVisible:
    element:
      text: ".*1 photos.*"
    direction: DOWN
- assertVisible: ".*1 photos.*"
