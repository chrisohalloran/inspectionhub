appId: co.inspectionhub.field
name: Atomic-rename termination and startup recovery
---
- launchApp:
    clearState: true
- openLink: "exp+inspectionhub-field://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081"
- tapOn:
    text: "InspectionHub Field, http://.*"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- assertVisible: "Take photo"
- scrollUntilVisible:
    element:
      text: "Show test tools"
    direction: UP
    centerElement: false
- tapOn: "Show test tools"
- scrollUntilVisible:
    element:
      text: "Test: terminate after rename"
    direction: DOWN
    centerElement: true
- tapOn: "Test: terminate after rename"
- assertVisible: "Test: terminate after rename selected"
- scrollUntilVisible:
    element:
      text: "Hide test tools"
    direction: UP
    centerElement: true
- tapOn: "Hide test tools"
- tapOn: "Take photo"
- launchApp
- tapOn:
    text: "Close"
    optional: true
- assertVisible: ".*Recovery checked 1 interrupted capture boundary. 1 photo ready locally.*"
