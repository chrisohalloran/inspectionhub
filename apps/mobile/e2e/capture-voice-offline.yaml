appId: co.inspectionhub.field
name: Local photo, voice and offline queue
---
- launchApp
- assertVisible: "Synthetic assigned inspection"
- assertVisible: "Take photo"
- tapOn: "Take photo"
- assertVisible: ".*Photo saved locally as private coverage evidence — queued for sync.*"
- tapOn: "Record voice note"
- assertVisible: ".*Voice note recording — photo capture remains available.*"
- assertVisible: "Take photo"
- tapOn: "Stop voice note"
- assertVisible: ".*Voice note saved locally — queued independently for sync.*"
- tapOn: "Test: go offline"
- assertVisible: "Offline — local capture remains available.*"
- tapOn: "Take photo"
- assertVisible: ".*Photo saved locally as private coverage evidence — queued for sync.*"
